            - text: The
            - strong [ref=e293]: MO§ES™
            - text: (Minimal Orthogonal Subset to Essential Structure) is a minimal enforcement system proposed in the 2026 preprint by D. J. McHenry to practically enforce the conservation of commitment in language models.
            - superscript [ref=e294] [cursor=pointer]:
              - link:
                - /url: "#ref-3"
                - superscript
