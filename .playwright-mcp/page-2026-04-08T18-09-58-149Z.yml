          - heading "Semantic invariance in compression Copy link to section Listen to this section" [level=3] [ref=e446]:
            - text: Semantic invariance in compression
            - generic [ref=e447]:
              - button "Copy link to section" [ref=e448] [cursor=pointer]:
                - img [ref=e449]
              - button "Listen to this section" [ref=e452] [cursor=pointer]:
                - img [ref=e453]
          - generic [ref=e456]: Semantic invariance in compression concerns the preservation of meaning or semantic content when data undergoes lossy transformations, distinguishing it from traditional syntactic or bit-level preservation in classical compression schemes.
          - generic [ref=e457]:
            - text: Research distinguishes between lossless semantic compression, which aims for exact recovery of semantic content, and lossy semantic compression, which permits some information loss while retaining core meaning or intent. Lossy approaches often suffice when perfect reconstruction of details is unnecessary, provided semantic essence remains intact. For instance, studies have demonstrated large language models' ability to perform approximate semantic compression on text and code, with metrics such as Semantic Reconstruction Effectiveness (SRE) quantifying how well intent is preserved after compression and decompression.
            - superscript [ref=e458] [cursor=pointer]:
              - link:
                - /url: "#ref-5"
                - superscript
              - link "[5]" [ref=e459]:
                - /url: "#ref-5"
          - generic [ref=e460]:
            - text: Earlier efforts to formalize semantic invariance include hierarchical abstraction techniques, where data is projected onto lower-resolution representations in an information lattice while maintaining semantic equivalence through equivalence classes of random variables that induce the same σ-algebra. This approach enables semantically meaningful lossy compression by exploiting abstraction levels and group-theoretic properties, such as permutation invariance, to achieve compression gains.
            - superscript [ref=e461] [cursor=pointer]:
              - link:
                - /url: "#ref-6"
                - superscript
              - link "[6]" [ref=e462]:
                - /url: "#ref-6"
          - generic [ref=e463]:
            - text: Information-theoretic analyses have established limits for compressing semantic sources modeled as correlated random variables under Bayesian networks, providing bounds for both lossless compression via conditional independence and lossy compression with rate-distortion functions tailored to semantic structure. These efforts incorporate side information and prove optimality conditions based on semantic relationships rather than purely statistical ones.
            - superscript [ref=e464] [cursor=pointer]:
              - link:
                - /url: "#ref-7"
                - superscript
              - link "[7]" [ref=e465]:
                - /url: "#ref-7"
          - generic [ref=e466]: Attempts to define semantic distance or invariance often rely on fidelity criteria beyond traditional metrics, such as lattice-based partition distances or probabilistic relationships that capture abstraction hierarchies, contrasting with standard measures of semantic similarity in natural language processing.
          - generic [ref=e467]: The proposed conservation of commitment represents a semantic-level analog to physical conservation laws, positing an invariant preserved under lossy compression and transformations.
          - generic [ref=e468]:
            - text: This differs markedly from rate-distortion theory, which optimizes bitrate subject to a distortion constraint typically measured in syntactic terms (e.g., mean squared error), without inherently enforcing semantic invariance as a conserved quantity. Mutual information-based approaches quantify shared statistical information but do not necessarily capture higher-order semantic preservation or invariance under recursive or transformative processes.
            - superscript [ref=e469] [cursor=pointer]:
              - link:
                - /url: "#ref-7"
                - superscript
              - link "[7]" [ref=e470]:
                - /url: "#ref-7"
            - superscript [ref=e471] [cursor=pointer]:
              - link:
                - /url: "#ref-6"
                - superscript
              - link "[6]" [ref=e472]:
                - /url: "#ref-6"
          - heading "Comparison to physical conservation laws Copy link to section Listen to this section" [level=3] [ref=e473]:
            - text: Comparison to physical conservation laws
            - generic [ref=e474]:
              - button "Copy link to section" [ref=e475] [cursor=pointer]:
                - img [ref=e476]
              - button "Listen to this section" [ref=e479] [cursor=pointer]:
                - img [ref=e480]
          - generic [ref=e483]: The term "conservation law" was adopted to emphasize the proposed invariance of commitment—defined as core intent, identity, or binding meaning—under certain classes of transformations, mirroring the structure of established physical conservation laws.
          - generic [ref=e484]: In physics, conservation laws identify quantities such as energy, linear momentum, angular momentum, and electric charge that remain constant in isolated systems regardless of the processes occurring within them. These invariances often arise from underlying symmetries of physical laws, as formalized by Noether's theorem, and have been empirically confirmed across diverse phenomena, from classical mechanics to quantum field theory.
          - generic [ref=e485]: The conservation of commitment draws a direct analogy by treating commitment as a semantic invariant preserved across lossy compression and recursive applications in language models, much as energy is preserved across physical transformations. The author argues that, just as violations of physical conservation laws would indicate new physics or measurement error, systematic violations of commitment conservation would reveal fundamental limitations or drifts in semantic processing.
          - generic [ref=e486]: "Key parallels include the focus on invariance under transformation groups: physical conservation laws hold under temporal translation (energy), spatial translation (momentum), and rotation (angular momentum), while commitment conservation is proposed to hold under semantic transformations such as summarization, paraphrase, and iterative self-application."
          - generic [ref=e487]: Important differences arise from the domains involved. Physical quantities are objective, measurable properties of the natural world, with conservation laws universally applicable and falsifiable through repeatable experiments in controlled settings. In contrast, commitment is a semantic construct specific to linguistic and cognitive systems, with conservation proposed as a model-agnostic principle rather than a fundamental law of nature. Falsifiability operates through computational experiments on language models rather than physical apparatus, and violations may reflect design choices or architectural limitations rather than new fundamental physics.
          - generic [ref=e488]: These distinctions highlight that while the conservation of commitment borrows the conceptual framework and rhetorical force of physical conservation laws to underscore the importance of semantic stability, it operates in the domain of engineered symbolic systems rather than natural phenomena.
