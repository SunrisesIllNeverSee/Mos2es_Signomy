          - generic [ref=e220]:
            - text: The
            - strong [ref=e221]: conservation of commitment
            - text: is a proposed semantic conservation law that asserts meaningful commitments in language—defined as the core intent, identity, or binding meaning carrying deontic force or obligations—remain preserved as an information-bearing invariant under specific transformations.
            - superscript [ref=e222] [cursor=pointer]:
              - link:
                - /url: "#ref-3"
                - superscript
              - link "[3]" [ref=e223]:
                - /url: "#ref-3"
            - superscript [ref=e224] [cursor=pointer]:
              - link:
                - /url: "#ref-1"
                - superscript
              - link "[1]" [ref=e225]:
                - /url: "#ref-1"
          - generic [ref=e226]: "The law is formally stated as follows:"
          - blockquote [ref=e227]:
            - generic [ref=e228]:
              - strong [ref=e229]: "Commitment Conservation:"
              - text: Meaningful commitments in language obey a conservation constraint under compression and recursive reuse.
              - superscript [ref=e230] [cursor=pointer]:
                - link:
                  - /url: "#ref-1"
                  - superscript
                - link "[1]" [ref=e231]:
                  - /url: "#ref-1"
          - generic [ref=e232]: "This principle claims that commitment is invariant under two primary classes of transformations:"
          - list [ref=e233]:
            - listitem [ref=e234]:
              - generic [ref=e235]:
                - strong [ref=e236]: Lossy compression
                - text: — operations such as summarization, paraphrasing, or other forms of content reduction that alter surface form while potentially discarding non-essential details, yet are expected to retain the underlying binding meaning.
            - listitem [ref=e237]:
              - generic [ref=e238]:
                - strong [ref=e239]: Recursive application
                - text: — iterative processes in which language model outputs are fed back as inputs (e.g., repeated generation, refinement, or self-referential prompting), testing stability across multiple cycles of transformation.
          - generic [ref=e240]:
            - text: The proposed law is presented as
            - strong [ref=e241]: model-agnostic
            - text: ", meaning it is not tied to any specific large language model architecture, training paradigm, or implementation details. It applies in principle to any system—artificial or human—that performs these kinds of meaning-preserving yet lossy transformations on language."
            - superscript [ref=e242] [cursor=pointer]:
              - link:
                - /url: "#ref-3"
                - superscript
              - link "[3]" [ref=e243]:
                - /url: "#ref-3"
            - superscript [ref=e244] [cursor=pointer]:
              - link:
                - /url: "#ref-1"
                - superscript
              - link "[1]" [ref=e245]:
                - /url: "#ref-1"
          - heading "Falsifiability criteria Copy link to section Listen to this section" [level=3] [ref=e246]:
            - text: Falsifiability criteria
            - generic [ref=e247]:
              - button "Copy link to section" [ref=e248] [cursor=pointer]:
                - img [ref=e249]
              - button "Listen to this section" [ref=e252] [cursor=pointer]:
                - img [ref=e253]
          - generic [ref=e256]:
            - text: The paper introduces falsifiability criteria for the proposed conservation of commitment law, enabling empirical assessment of whether core commitments remain invariant under lossy compression and recursive application.
            - superscript [ref=e257] [cursor=pointer]:
              - link:
                - /url: "#ref-3"
                - superscript
              - link "[3]" [ref=e258]:
                - /url: "#ref-3"
          - generic [ref=e259]:
            - text: These criteria rely on compression-based stress tests paired with lineage-aware metrics to determine if the law holds or can be refuted. Commitment preservation is tested by subjecting language signals to repeated transformative compression over multiple recursive iterations, typically up to depth 10, while tracking degradation in the underlying meaning.
            - superscript [ref=e260] [cursor=pointer]:
              - link:
                - /url: "#ref-4"
                - superscript
              - link "[4]" [ref=e261]:
                - /url: "#ref-4"
          - generic [ref=e262]:
            - text: Violation of the law would be demonstrated if metrics show substantial loss of commitment despite the transformations being applied, such as high drift rates (e.g., 0.058 per iteration in probabilistic baselines), low commitment stability (e.g., 0.42 ± 0.12), or poor identity preservation (e.g., 38%). In such cases, original commitments degrade significantly, often reducing detailed or specific statements to generic or incoherent outputs after several iterations.
            - superscript [ref=e263] [cursor=pointer]:
              - link:
                - /url: "#ref-4"
                - superscript
              - link "[4]" [ref=e264]:
                - /url: "#ref-4"
          - generic [ref=e265]:
            - text: The proposed tests use a model-agnostic protocol that applies lossy compression backends and evaluates semantic fidelity via min-aggregated scores combining Jaccard similarity, cosine similarity, and NLI-based proxies, allowing systematic exposure of failure modes not captured by standard retrieval benchmarks.
            - superscript [ref=e266] [cursor=pointer]:
              - link:
                - /url: "#ref-4"
                - superscript
              - link "[4]" [ref=e267]:
                - /url: "#ref-4"
          - generic [ref=e268]:
            - text: These criteria differentiate falsification of the conservation law itself—which would require evidence that
            - link "commitment" [ref=e269] [cursor=pointer]:
              - /url: /page/precommitment
            - text: cannot be preserved as an invariant under the specified dual stress regime—from falsification of particular enforcement mechanisms, which would involve failures limited to specific implementation strategies rather than the underlying principle.
            - superscript [ref=e270] [cursor=pointer]:
              - link:
                - /url: "#ref-4"
                - superscript
              - link "[4]" [ref=e271]:
                - /url: "#ref-4"
