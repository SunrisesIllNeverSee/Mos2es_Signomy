                - /url: "#ref-3"
                - superscript
              - link "[3]" [ref=e177]:
                - /url: "#ref-3"
            - text: It also proposes MO§ES™ as a minimal enforcement system to uphold the invariant and explores model-agnostic implications for maintaining semantic stability in long-chain reasoning, identity preservation in AI agents, and iterative generation processes.
