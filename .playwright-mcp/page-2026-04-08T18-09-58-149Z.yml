              - link "[1]" [ref=e203]:
                - /url: "#ref-1"
          - generic [ref=e204]:
            - text: This definition positions commitment as the core semantic element—encompassing intent, identity, or binding meaning—that constitutes the essential, preserved content of a linguistic expression, distinct from transient surface features (specific tokens or phrasing) and probabilistic associations (statistical patterns exploited by language models). The invariant nature of commitment refers to the underlying meaning that carries obligatory or identity-defining force, such as promises, obligations, contractual terms, or self-identifications.
            - superscript [ref=e205] [cursor=pointer]:
              - link:
                - /url: "#ref-1"
                - superscript
              - link "[1]" [ref=e206]:
                - /url: "#ref-1"
          - generic [ref=e207]:
            - text: Identification of commitment relies on linguistic cues that signal binding intent, particularly modal patterns expressing necessity, obligation, permission, or intention (e.g., modal verbs like "must," "shall," "will," or constructions implying promises and contracts). These patterns distinguish commitment from mere descriptive or associative content, providing operational criteria for detecting the invariant in both human- and model-generated language.
            - superscript [ref=e208] [cursor=pointer]:
              - link:
                - /url: "#ref-1"
                - superscript
              - link "[1]" [ref=e209]:
                - /url: "#ref-1"
          - heading "Statement of the conservation law Copy link to section Listen to this section" [level=3] [ref=e210]:
            - text: Statement of the conservation law
            - generic [ref=e211]:
