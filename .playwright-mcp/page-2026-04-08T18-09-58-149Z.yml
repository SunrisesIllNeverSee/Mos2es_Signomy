                - /url: "#ref-3"
            - text: "Published on Zenodo (DOI: 10.5281/zenodo.18792459), the work proposes commitment—understood as core intent, identity, or binding meaning—as an invariant preserved under lossy compression and recursive transformations in language processing, particularly within large language models."
          - generic [ref=e175]:
            - text: The paper presents definitions of commitment and the conservation law, establishes falsifiability criteria through compression-driven stress tests and lineage-aware evaluation, and critiques probabilistic drift in agentic models.
            - superscript [ref=e176] [cursor=pointer]:
