          - generic [ref=e172]:
            - text: The 2026 preprint "A Conservation Law for Commitment in Language Under Transformative Compression and Recursive Application" by D. J. McHenry introduced the formalized concept of conservation of commitment.
            - superscript [ref=e173] [cursor=pointer]:
