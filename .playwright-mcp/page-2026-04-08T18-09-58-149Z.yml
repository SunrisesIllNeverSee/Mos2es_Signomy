          - generic [ref=e198]:
            - text: In the 2026 paper "A Conservation Law for Commitment in Language Under Transformative Compression and Recursive Application" by D. J. McHenry,
            - strong [ref=e199]: commitment
            - text: is formally defined as an information-bearing invariant that must be preserved across language transformations such as paraphrase, summarization, and iterative reuse, even as surface form and representation change.
            - superscript [ref=e200] [cursor=pointer]:
              - link:
                - /url: "#ref-3"
                - superscript
              - link "[3]" [ref=e201]:
                - /url: "#ref-3"
            - superscript [ref=e202] [cursor=pointer]:
