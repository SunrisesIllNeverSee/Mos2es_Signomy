              - link "[1]" [ref=e297]:
                - /url: "#ref-1"
          - generic [ref=e298]:
            - text: It is designed according to principles of minimalism and model-agnosticism, seeking to apply the lightest possible interventions that remain independent of specific model architectures or training details. The system is trademarked by Ello Cello LLC and falls under associated intellectual property protections, including copyright and provisional patent applications filed with the USPTO.
            - superscript [ref=e299] [cursor=pointer]:
              - link:
                - /url: "#ref-1"
                - superscript
              - link "[1]" [ref=e300]:
                - /url: "#ref-1"
          - generic [ref=e301]:
            - text: MO§ES™ aims to maintain core commitment invariance during transformative compression and recursive processes by focusing on essential semantic structures while avoiding unnecessary complexity in enforcement mechanisms. Detailed operational specifications are provided in the preprint.
            - superscript [ref=e302] [cursor=pointer]:
              - link:
                - /url: "#ref-3"
