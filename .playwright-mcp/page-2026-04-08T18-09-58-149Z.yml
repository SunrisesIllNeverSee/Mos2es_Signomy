                - img [ref=e155]
          - generic [ref=e158]: The emergence of the concept of conservation of commitment in AI research can be traced to growing concerns during the early to mid-2020s about the stability of semantic meaning in large language models (LLMs) subjected to iterative, recursive, or transformative processes.
          - generic [ref=e159]: As LLMs were increasingly used for long-chain reasoning, iterative refinement, and agentic applications involving self-calls or looped interactions, researchers documented phenomena such as semantic drift, where initial intent or binding meaning progressively deviated across multiple generations or compression steps. These observations highlighted risks of meaning erosion in recursive use cases, including self-prompting chains and autonomous agent workflows, where repeated application of lossy transformations led to unintended shifts in core intent.
          - generic [ref=e160]: Related lines of inquiry in interpretability research examined how neural representations and lossy compression mechanisms in transformers could diminish nuanced semantic features over processing steps. Similarly, studies on agent coherence and long-term alignment emphasized the challenge of preserving identity or goal consistency as agents engaged in extended, recursive operations, noting degradation in alignment over prolonged interaction chains.
          - generic [ref=e161]: These pre-existing discussions underscored the practical limitations of probabilistic modeling in maintaining semantic fidelity across transformative and recursive applications, setting the stage for the later formalization of commitment as an invariant.
