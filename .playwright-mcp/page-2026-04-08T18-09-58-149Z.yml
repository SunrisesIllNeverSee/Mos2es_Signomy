          - generic [ref=e103]: The conservation of commitment is a proposed semantic conservation law that treats "commitment"—defined as the core intent, identity, or binding meaning of a linguistic expression—as an invariant preserved under lossy compression and recursive transformations in language.
          - generic [ref=e104]: In this context, commitment represents the essential semantic element that makes a statement bind to a specific meaning or obligation, distinguishing it from mere surface wording or probabilistic associations. The law posits that this core commitment remains unchanged even as language undergoes substantial compression (such as summarization or token reduction) or repeated self-application (recursive prompting or iterative generation), where gradual semantic drift can occur.
          - generic [ref=e105]: By proposing commitment as a conserved quantity analogous to physical invariants, the framework seeks to characterize and potentially mitigate such drift at a fundamental level.
          - generic [ref=e106]:
            - text: This concept was introduced and formalized in the 2026 paper "A Conservation Law for Commitment in Language Under Transformative Compression and Recursive Application" by D. J. McHenry.
            - superscript [ref=e107] [cursor=pointer]:
              - link:
                - /url: "#ref-3"
                - superscript
              - link "[3]" [ref=e108]:
                - /url: "#ref-3"
          - heading "Relation to language models Copy link to section Listen to this section" [level=3] [ref=e109]:
            - text: Relation to language models
            - generic [ref=e110]:
              - button "Copy link to section" [ref=e111] [cursor=pointer]:
                - img [ref=e112]
              - button "Listen to this section" [ref=e115] [cursor=pointer]:
                - img [ref=e116]
          - generic [ref=e119]:
            - text: Large language models frequently exhibit semantic drift during processes involving recursive prompting, iterative generation, and lossy summarization. In recursive prompting and iterative generation, where model outputs are repeatedly fed back as inputs, core meanings tend to erode over cycles, resulting in substantial deviations from original intent. Empirical tests demonstrate that without safeguards, such iterative reuse can destroy commitments entirely, reducing detailed statements to vague or generic text such as "Pretty straightforward. Nothing too complicated here."
            - superscript [ref=e120] [cursor=pointer]:
              - link:
                - /url: "#ref-1"
                - superscript
              - link "[1]" [ref=e121]:
                - /url: "#ref-1"
            - superscript [ref=e122] [cursor=pointer]:
              - link:
                - /url: "#ref-4"
                - superscript
              - link "[4]" [ref=e123]:
                - /url: "#ref-4"
          - generic [ref=e124]:
            - text: Lossy summarization, a common form of transformative compression, similarly jeopardizes binding meanings by prioritizing brevity over fidelity, allowing key obligations or identities to degrade or vanish across iterations. Tests across corpora show that baseline approaches under these conditions achieve zero fidelity in preserving certain commitment categories, highlighting the vulnerability of unmitigated LLM transformations.
            - superscript [ref=e125] [cursor=pointer]:
              - link:
                - /url: "#ref-1"
                - superscript
              - link "[1]" [ref=e126]:
                - /url: "#ref-1"
          - generic [ref=e127]:
            - text: Probabilistic drift represents a primary observed phenomenon in agentic models, where stochastic sampling during generation amplifies cumulative deviations. Baseline probabilistic regimes exhibit drift rates as high as 0.058 per iteration and commitment stability as low as 0.42 ± 0.12 across multiple cycles, in stark contrast to enforced approaches that maintain far lower drift and higher stability.
            - superscript [ref=e128] [cursor=pointer]:
              - link:
                - /url: "#ref-1"
                - superscript
              - link "[1]" [ref=e129]:
                - /url: "#ref-1"
            - superscript [ref=e130] [cursor=pointer]:
              - link:
                - /url: "#ref-4"
                - superscript
              - link "[4]" [ref=e131]:
                - /url: "#ref-4"
          - generic [ref=e132]:
            - text: Existing alignment and safety techniques, including standard retrieval benchmarks and conventional fine-tuning methods, do not adequately address these long-term instabilities. Such techniques typically focus on surface-level metrics or single-step performance and fail to expose or mitigate failure modes revealed by extended transformative compression and recursive application.
            - superscript [ref=e133] [cursor=pointer]:
              - link:
                - /url: "#ref-4"
                - superscript
              - link "[4]" [ref=e134]:
                - /url: "#ref-4"
          - generic [ref=e135]:
            - text: The proposed conservation law for commitment has been introduced as a potential framework to preserve core intent as an invariant under these conditions.
            - superscript [ref=e136] [cursor=pointer]:
